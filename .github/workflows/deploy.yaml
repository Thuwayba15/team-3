name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push MVC image
        uses: docker/build-push-action@v5
        with:
          context: backend/aspnet-core
          file: backend/aspnet-core/src/Team3.Web.Mvc/Dockerfile
          push: true
          tags: ghcr.io/thuwayba15/team3-mvc:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            # ── Docker ────────────────────────────────────────────────
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            if ! groups $USER | grep -q docker; then
              sudo usermod -aG docker $USER
            fi

            # ── Deployment directory ──────────────────────────────────
            sudo mkdir -p /opt/team3 && sudo chown $USER:$USER /opt/team3

            # ── Write docker-compose ──────────────────────────────────
            cat > /opt/team3/docker-compose.yml <<'COMPOSEEOF'
            version: '3'
            services:
              abp_host:
                image: ghcr.io/thuwayba15/team3-mvc:latest
                env_file:
                  - .env
                environment:
                  TZ: "America/Toronto"
                  Kestrel__Endpoints__Http__Url: "http://+:80"
                ports:
                  - "44312:80"
                volumes:
                  - "./Mvc-Logs:/app/App_Data/Logs"
                restart: always
            COMPOSEEOF

            # ── Write env file ────────────────────────────────────────
            {
              printf 'ASPNETCORE_ENVIRONMENT=Production\n'
              printf 'ConnectionStrings__Default=%s\n' '${{ secrets.DB_CONNECTION_STRING }}'
              printf 'Authentication__JwtBearer__SecurityKey=%s\n' '${{ secrets.JWT_SECURITY_KEY }}'
              printf 'Authentication__JwtBearer__Issuer=Team3\n'
              printf 'Authentication__JwtBearer__Audience=Team3\n'
            } > /opt/team3/.env

            # ── Deploy ────────────────────────────────────────────────
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u thuwayba15 --password-stdin
            sudo docker compose -f /opt/team3/docker-compose.yml --project-directory /opt/team3 down || true
            sudo docker compose -f /opt/team3/docker-compose.yml --project-directory /opt/team3 pull
            sudo docker compose -f /opt/team3/docker-compose.yml --project-directory /opt/team3 up -d
            sudo docker image prune -f
